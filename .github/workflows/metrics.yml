name: Metrics

on:
  schedule:
    - cron: "23 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          filename: github-metrics.svg
          user: Duang777
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Shanghai
          config_order: base.header, isocalendar, languages, repositories, habits, lines
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_sections: most-used, recently-used
          plugin_languages_details: bytes-size, percentage
          plugin_repositories: yes
          plugin_repositories_featured: Duang777/helios, Duang777/GPT-Voyager, Duang777/feedpilot, Duang777/forgepilot-agent
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_lines: yes
          plugin_lines_sections: base
          output_action: commit
          committer_message: "chore: update profile metrics"
